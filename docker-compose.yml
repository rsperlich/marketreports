services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j4dektop
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j4dektop
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./eval_results:/app/eval_results
      - ./firms_4.rds:/app/firms_4.rds:ro

volumes:
  neo4j_data:
